[build]
builder = "NIXPACKS"

[nixpacks]
install = "npm install"

[deploy]
startCommand = "npx tsx src/app.ts"
healthCheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[metadata]
name = "al-shafi-backend"
description = "Backend API for Al-Shafi Healthcare Application"